// ─── Helpers ──────────────────────────────────────────────────────────────────
function getLatestPrices(prices,projectId=null){
  const pool=prices.filter(p=>p.projectId===projectId||p.projectId===null);
  const map={};
  pool.forEach(p=>{const k=`${p.product}||${p.supplier}`;if(!map[k]||new Date(p.date)>new Date(map[k].date))map[k]=p;});
  return Object.values(map);
}
function getPriceAlerts(data,projectId=null){
  const threshold=(data.settings?.alertThreshold||5)/100;
  const alerts=[];
  const pool=data.prices.filter(p=>p.projectId===projectId||p.projectId===null);
  const products=[...new Set(pool.map(p=>p.product))];
  products.forEach(prod=>{
    const entries=pool.filter(p=>p.product===prod).sort((a,b)=>new Date(a.date)-new Date(b.date));
    [...new Set(entries.map(e=>e.supplier))].forEach(sup=>{
      const se=entries.filter(e=>e.supplier===sup);
      if(se.length>=2){
        const old=se[se.length-2].price,curr=se[se.length-1].price;
        if(old>0){const pct=(curr-old)/old;if(pct>threshold)alerts.push({product:prod,supplier:sup,oldPrice:old,newPrice:curr,pct:(pct*100).toFixed(1)});}
      }
    });
  });
  return alerts;
}

// ─── Projects Page ────────────────────────────────────────────────────────────
function ProjectsPage({data,save,notify,activeProject,setActiveProject,setPage}){
  const [adding,setAdding]=useState(false);
  const [form,setForm]=useState({name:"",type:"Εστιατόριο",city:""});

  const addProject=()=>{
    if(!form.name.trim()){notify("Συμπληρώστε όνομα","error");return;}
    const p={id:Date.now(),...form,active:true,createdAt:new Date().toISOString().split("T")[0]};
    const updated={...data,projects:[...(data.projects||[]),p]};
    save(updated);notify("✅ Project δημιουργήθηκε");
    setForm({name:"",type:"Εστιατόριο",city:""});setAdding(false);
    setActiveProject(p.id);
  };

  const toggleProject=(id)=>save({...data,projects:data.projects.map(p=>p.id===id?{...p,active:!p.active}:p)});
  const deleteProject=(id)=>{
    if(activeProject===id)setActiveProject(null);
    save({...data,projects:data.projects.filter(p=>p.id!==id),recipes:data.recipes.filter(r=>r.projectId!==id)});
    notify("Project διαγράφηκε");
  };

  const TYPES=["Εστιατόριο","Ξενοδοχείο","Catering","Ταβέρνα","Μπαρ","Καφέ","Άλλο"];

  return(
    <PageWrap>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div><div style={{color:"#e2c97e",fontWeight:700,fontSize:18}}>🏢 Διαχείριση Projects</div>
        <div style={{color:"#4a6a8a",fontSize:13,marginTop:3}}>Κάθε project = μία επιχείρηση με δικές της συνταγές και κοστολόγηση</div></div>
        <Btn onClick={()=>setAdding(!adding)} variant={adding?"ghost":"success"}>{adding?"Ακύρωση":"+ Νέο Project"}</Btn>
      </div>

      {adding&&(
        <Card style={{marginBottom:20,border:"1px solid #16a34a"}}>
          <div style={{color:"#16a34a",fontWeight:700,marginBottom:16}}>Νέο Project</div>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr auto",gap:12,alignItems:"flex-end"}}>
            <div><Label>Επωνυμία Επιχείρησης *</Label><Input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="π.χ. ΞΕΝΟΔΟΧΕΙΟ ΠΑΛΛΑΣ"/></div>
            <div><Label>Τύπος</Label><Select value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>{TYPES.map(t=><option key={t}>{t}</option>)}</Select></div>
            <div><Label>Πόλη</Label><Input value={form.city} onChange={e=>setForm({...form,city:e.target.value})} placeholder="Αθήνα"/></div>
            <Btn onClick={addProject} variant="success">Δημιουργία</Btn>
          </div>
        </Card>
      )}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:16}}>
        {(data.projects||[]).map((p,i)=>{
          const color=PROJECT_COLORS[i%PROJECT_COLORS.length];
          const recipeCount=data.recipes.filter(r=>r.projectId===p.id).length;
          const isActive=activeProject===p.id;
          return(
            <Card key={p.id} style={{borderTop:`3px solid ${color}`,border:`1px solid ${isActive?color:"#1e3a5f"}`,background:isActive?`${color}08`:"#0d1829"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <div>
                  <div style={{color:color,fontWeight:700,fontSize:16,marginBottom:2}}>{p.name}</div>
                  <div style={{color:"#4a6a8a",fontSize:12}}>{p.type}{p.city?` · ${p.city}`:""} · από {p.createdAt}</div>
                </div>
                {isActive&&<span style={{background:`${color}20`,color:color,fontSize:10,padding:"3px 10px",borderRadius:10,fontWeight:700}}>ΕΝΕΡΓΟ</span>}
              </div>
              <div style={{display:"flex",gap:10,marginBottom:14}}>
                <div style={{flex:1,background:"#0a1520",borderRadius:7,padding:"8px 12px"}}>
                  <div style={{color:"#4a6a8a",fontSize:10,marginBottom:2}}>ΣΥΝΤΑΓΕΣ</div>
                  <div style={{color:color,fontWeight:700,fontSize:20}}>{recipeCount}</div>
                </div>
                <div style={{flex:1,background:"#0a1520",borderRadius:7,padding:"8px 12px"}}>
                  <div style={{color:"#4a6a8a",fontSize:10,marginBottom:2}}>ΚΑΤΑΣΤΑΣΗ</div>
                  <div style={{color:p.active?"#16a34a":"#4a6a8a",fontWeight:700,fontSize:13}}>{p.active?"✓ Ενεργό":"✕ Ανενεργό"}</div>
                </div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <Btn small variant={isActive?"gold":"ghost"} style={{flex:1}}
                  onClick={()=>{setActiveProject(p.id);setPage("recipes");}}>
                  {isActive?"✓ Ενεργό":"Επιλογή"}
                </Btn>
                <Btn small variant="ghost" onClick={()=>{setActiveProject(p.id);setPage("recipe-form");}}>+ Συνταγή</Btn>

          );
        })}
      </div>

  );
}

// ─── Prices Page (with Excel import) ─────────────────────────────────────────
function PricesPage({data,save,notify,activeProject}){
  const [mode,setMode]=useState("excel"); // "excel" | "manual"
  const [supplier,setSupplier]=useState(data.suppliers[0]?.name||"");
  const [category,setCategory]=useState("ΜΑΝΑΒΙΚΗ");
  const [date,setDate]=useState(new Date().toISOString().split("T")[0]);
  const [rows,setRows]=useState([{product:"",unit:"ΚΙΛΟ",price:""}]);
  const [excelPreview,setExcelPreview]=useState(null); // {raw, mapped}
  const [colMap,setColMap]=useState({product:0,unit:1,price:2});
  const [importing,setImporting]=useState(false);
  const fileRef=useRef();
  const UNITS=["ΚΙΛΟ","ΛΙΤΡΟ","ΤΕΜ","ΤΜΧ","ΓΡΑΜΜΑΡΙΑ","ΤΕΜΑΧΙΟ","ΚΙΒΩΤΙΟ"];

  const handleFile=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    setImporting(true);
    try{
      const ab=await file.arrayBuffer();
      const wb=XLSX.read(ab,{type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      // Find header row (first row with 3+ non-empty cells)
      let headerRow=0;
      for(let i=0;i<Math.min(10,raw.length);i++){
        if(raw[i].filter(c=>c!=="").length>=2){headerRow=i;break;}
      }
      const headers=raw[headerRow].map((h,i)=>({label:String(h),idx:i}));
      const dataRows=raw.slice(headerRow+1).filter(r=>r.some(c=>c!==""));

      // Auto-detect columns
      const autoMap={product:0,unit:1,price:2};
      headers.forEach(h=>{
        const hl=String(h.label).toLowerCase();
        if(/(προϊ|product|name|περιγ|desc|υλικ)/i.test(hl))autoMap.product=h.idx;
        else if(/(μον|unit|um)/i.test(hl))autoMap.unit=h.idx;
        else if(/(τιμ|price|αξ|cost)/i.test(hl))autoMap.price=h.idx;
      });

      setColMap(autoMap);
      setExcelPreview({headers,dataRows,fileName:file.name});
    }catch(err){notify("Σφάλμα ανάγνωσης αρχείου","error");}
    setImporting(false);
    if(fileRef.current)fileRef.current.value="";
  };

  const getMappedRows=()=>{
    if(!excelPreview)return[];
    return excelPreview.dataRows.map(r=>({
      product:String(r[colMap.product]||"").trim().toUpperCase(),
      unit:String(r[colMap.unit]||"ΚΙΛΟ").trim().toUpperCase()||"ΚΙΛΟ",
      price:parseFloat(String(r[colMap.price]||"0").replace(",","."))||0,
    })).filter(r=>r.product&&r.price>0);
  };

  const importExcel=()=>{
    const mapped=getMappedRows();
    if(!mapped.length){notify("Δεν βρέθηκαν έγκυρες γραμμές","error");return;}
    const latest=getLatestPrices(data.prices,activeProject);
    const newPrices=mapped.map((r,i)=>{
      const existing=latest.find(p=>p.product===r.product&&p.supplier===supplier);
      return{id:Date.now()+i,date,product:r.product,unit:r.unit,price:r.price,supplier,category,projectId:activeProject||null,prevPrice:existing?.price||null};
    });
    save({...data,prices:[...data.prices,...newPrices]});
    notify(`✅ Εισήχθησαν ${newPrices.length} τιμές από ${supplier}`);
    setExcelPreview(null);
  };

  const importManual=()=>{
    const valid=rows.filter(r=>r.product.trim()&&r.price&&!isNaN(parseFloat(r.price)));
    if(!valid.length){notify("Δεν υπάρχουν έγκυρες γραμμές","error");return;}
    const latest=getLatestPrices(data.prices,activeProject);
    const newPrices=valid.map((r,i)=>{
      const existing=latest.find(p=>p.product===r.product.toUpperCase()&&p.supplier===supplier);
      return{id:Date.now()+i,date,product:r.product.trim().toUpperCase(),unit:r.unit,price:parseFloat(r.price),supplier,category,projectId:activeProject||null,prevPrice:existing?.price||null};
    });
    save({...data,prices:[...data.prices,...newPrices]});
    notify(`✅ Εισήχθησαν ${newPrices.length} τιμές`);
    setRows([{product:"",unit:"ΚΙΛΟ",price:""}]);
  };

  const updateRow=(i,k,v)=>{const r=[...rows];r[i]={...r[i],[k]:v};setRows(r);};
  const mapped=excelPreview?getMappedRows():[];

  return(
    <PageWrap>
      {/* Top controls */}
      <div style={{display:"grid",gridTemplateColumns:"280px 1fr",gap:16,marginBottom:16}}>
        <Card>
          <div style={{color:"#e2c97e",fontWeight:700,marginBottom:16}}>Στοιχεία Εισαγωγής</div>
          <div style={{marginBottom:12}}><Label>Ημερομηνία</Label><Input type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
          <div style={{marginBottom:12}}>
            <Label>Κατηγορία</Label>
            <Select value={category} onChange={e=>setCategory(e.target.value)}>{CATEGORIES.map(c=><option key={c}>{c}</option>)}</Select>
          </div>
          <div style={{marginBottom:16}}>
            <Label>Προμηθευτής</Label>
            <Select value={supplier} onChange={e=>{setSupplier(e.target.value);const s=data.suppliers.find(x=>x.name===e.target.value);if(s)setCategory(s.category);}}>
              {data.suppliers.filter(s=>s.active).map(s=><option key={s.id}>{s.name}</option>)}
            </Select>
          </div>
          {/* Mode toggle */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:12}}>
            <button onClick={()=>setMode("excel")} style={{padding:"8px 6px",borderRadius:7,border:`2px solid ${mode==="excel"?"#2563eb":"#1e3a5f"}`,background:mode==="excel"?"#172040":"transparent",color:mode==="excel"?"#93c5fd":"#4a6a8a",fontSize:12,cursor:"pointer",fontWeight:600}}>📂 Excel</button>
            <button onClick={()=>setMode("manual")} style={{padding:"8px 6px",borderRadius:7,border:`2px solid ${mode==="manual"?"#16a34a":"#1e3a5f"}`,background:mode==="manual"?"#0d2010":"transparent",color:mode==="manual"?"#16a34a":"#4a6a8a",fontSize:12,cursor:"pointer",fontWeight:600}}>⌨ Χειροκίνητα</button>
          </div>
          <div style={{background:"#0a1520",borderRadius:8,padding:"10px 12px",border:"1px solid #1e3a5f"}}>
            <div style={{color:"#4a6a8a",fontSize:10,marginBottom:3}}>ΕΠΙΛΕΓΜΕΝΟΣ</div>
            <div style={{color:"#e2c97e",fontWeight:700,fontSize:15}}>{supplier}</div>
            <div style={{color:CAT_COLORS[category]||"#888",fontSize:11}}>{CAT_ICONS[category]} {category}</div>
          </div>
        </Card>

        {/* Excel import panel */}
        {mode==="excel"&&(
          <Card>
            <div style={{color:"#e2c97e",fontWeight:700,marginBottom:16}}>📂 Εισαγωγή από Excel</div>
            {!excelPreview?(
              <div>
                <div style={{border:"2px dashed #1e3a5f",borderRadius:10,padding:"40px 20px",textAlign:"center",marginBottom:16,cursor:"pointer"}}
                  onClick={()=>fileRef.current?.click()}>
                  <div style={{fontSize:40,marginBottom:10}}>📊</div>
                  <div style={{color:"#c8daea",fontWeight:600,marginBottom:6}}>Κάντε κλικ για επιλογή αρχείου Excel</div>
                  <div style={{color:"#4a6a8a",fontSize:12}}>Υποστηρίζονται: .xlsx · .xls · .csv</div>
                  <div style={{color:"#4a6a8a",fontSize:11,marginTop:8}}>Το αρχείο πρέπει να έχει στήλες: Προϊόν · Μονάδα · Τιμή</div>
                </div>
                <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" onChange={handleFile} style={{display:"none"}}/>
                {importing&&<div style={{textAlign:"center",color:"#e2c97e"}}>⏳ Ανάγνωση αρχείου...</div>}
              </div>
            ):(
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <div style={{color:"#16a34a",fontSize:13}}>✅ {excelPreview.fileName} — {mapped.length} γραμμές</div>
                  <Btn small variant="ghost" onClick={()=>setExcelPreview(null)}>✕ Νέο αρχείο</Btn>
                </div>

                {/* Column mapping */}
                <div style={{background:"#0a1520",borderRadius:8,padding:14,marginBottom:14,border:"1px solid #1e3a5f"}}>
                  <div style={{color:"#4a6a8a",fontSize:11,fontWeight:700,letterSpacing:1,marginBottom:10}}>ΑΝΤΙΣΤΟΙΧΗΣΗ ΣΤΗΛΩΝ</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
                    {[["product","Προϊόν"],["unit","Μονάδα"],["price","Τιμή"]].map(([k,lbl])=>(
                      <div key={k}>
                        <Label>{lbl}</Label>
                        <Select value={colMap[k]} onChange={e=>setColMap({...colMap,[k]:parseInt(e.target.value)})}>
                          {excelPreview.headers.map(h=><option key={h.idx} value={h.idx}>{h.label||`Στήλη ${h.idx+1}`}</option>)}
                        </Select>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Preview table */}
                <div style={{maxHeight:280,overflowY:"auto",marginBottom:14}}>
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead><tr><TH>#</TH><TH>Προϊόν</TH><TH>Μονάδα</TH><TH center>Τιμή</TH><TH center>Προηγ. Τιμή</TH><TH center>% Αλλαγή</TH></tr></thead>
                    <tbody>
                      {mapped.map((r,i)=>{
                        const latest=getLatestPrices(data.prices,activeProject).find(p=>p.product===r.product&&p.supplier===supplier);
                        const pct=latest&&latest.price>0?((r.price-latest.price)/latest.price*100).toFixed(1):null;
                        return(
                          <tr key={i} style={{background:i%2===0?"#080f1a":"transparent"}}>
                            <TD center><span style={{color:"#4a6a8a"}}>{i+1}</span></TD>
                            <TD style={{fontWeight:600}}>{r.product}</TD>
                            <TD center style={{color:"#4a6a8a"}}>{r.unit}</TD>
                            <TD center style={{color:"#e2c97e",fontWeight:700}}>{r.price.toFixed(4)}€</TD>
                            <TD center style={{color:"#4a6a8a"}}>{latest?`${latest.price.toFixed(4)}€`:"—"}</TD>
                            <TD center>{pct!==null?<span style={{color:parseFloat(pct)>5?"#ef4444":parseFloat(pct)>0?"#f59e0b":"#16a34a",fontWeight:700,fontSize:12}}>{parseFloat(pct)>0?"+":""}{pct}%</span>:"—"}</TD>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
                <Btn onClick={importExcel} variant="success" style={{width:"100%",padding:11}}>
                  ✅ ΕΙΣΑΓΩΓΗ {mapped.length} ΤΙΜΩΝ ΑΠΟ {supplier}
                </Btn>
              </div>
            )}
          </Card>
        )}

        {/* Manual entry */}
        {mode==="manual"&&(
          <Card>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{color:"#e2c97e",fontWeight:700}}>⌨ Χειροκίνητη Εισαγωγή</div>
              <Btn small variant="ghost" onClick={()=>setRows([...rows,{product:"",unit:"ΚΙΛΟ",price:""}])}>+ Γραμμή</Btn>
            </div>
            <div style={{maxHeight:340,overflowY:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr><TH>#</TH><TH>Προϊόν</TH><TH>Μονάδα</TH><TH>Τιμή (€)</TH><TH center>Τελευτ.</TH><TH center>%</TH><TH></TH></tr></thead>
                <tbody>
                  {rows.map((r,i)=>{
                    const latest=getLatestPrices(data.prices,activeProject).find(p=>p.product===r.product.toUpperCase()&&p.supplier===supplier);
                    const pct=latest&&r.price&&!isNaN(parseFloat(r.price))?((parseFloat(r.price)-latest.price)/latest.price*100).toFixed(1):null;
                    return(
                      <tr key={i} style={{background:i%2===0?"#080f1a":"transparent"}}>
                        <TD center style={{color:"#4a6a8a"}}>{i+1}</TD>
                        <TD><input value={r.product} onChange={e=>updateRow(i,"product",e.target.value)} placeholder="Προϊόν..." style={{width:"100%",background:"transparent",border:"none",borderBottom:"1px solid #1e3a5f",color:"#c8daea",fontSize:13,padding:"3px 0",outline:"none"}}/></TD>

// ─── Compare Page ─────────────────────────────────────────────────────────────
function ComparePage({data,notify,activeProject}){
  const [search,setSearch]=useState("");
  const [catFilter,setCatFilter]=useState("ΟΛΑ");
  const latest=getLatestPrices(data.prices,activeProject);
  const products=[...new Set(latest.map(p=>p.product))].sort();
  const filtered=products.filter(p=>{
    if(search&&!p.toLowerCase().includes(search.toLowerCase()))return false;
    if(catFilter!=="ΟΛΑ"){const e=latest.filter(x=>x.product===p);if(!e.some(x=>x.category===catFilter))return false;}
    return true;
  });
  return(
    <PageWrap>
      <Card style={{marginBottom:14}}>
        <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Αναζήτηση..."
            style={{flex:1,minWidth:200,padding:"9px 12px",background:"#0a1520",border:"1px solid #1e3a5f",borderRadius:7,color:"#c8daea",fontSize:13,outline:"none"}}/>
          {["ΟΛΑ",...CATEGORIES].map(c=>(
            <button key={c} onClick={()=>setCatFilter(c)}
              style={{padding:"7px 12px",borderRadius:7,border:`1px solid ${catFilter===c?(CAT_COLORS[c]||"#e2c97e"):"#1e3a5f"}`,background:catFilter===c?"#0a1520":"transparent",color:catFilter===c?(CAT_COLORS[c]||"#e2c97e"):"#4a6a8a",fontSize:11,cursor:"pointer",fontWeight:catFilter===c?700:400}}>
              {CAT_ICONS[c]||"📦"} {c}
            </button>
          ))}
        </div>
      </Card>
      <Card>
        <div style={{color:"#e2c97e",fontWeight:700,marginBottom:14}}>⚖ Σύγκριση Τιμών — {filtered.length} προϊόντα</div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>
              <TH>Προϊόν</TH><TH>Μον.</TH><TH>Κατηγορία</TH>
              {data.suppliers.filter(s=>s.active).map(s=><TH key={s.id} center>{s.name}</TH>)}
              <TH center>✅ Φθηνότερος</TH><TH center>Εξοικονόμηση</TH>
            </tr></thead>
            <tbody>
              {filtered.map(prod=>{
                const entries=latest.filter(p=>p.product===prod);
                const prices=entries.map(e=>e.price);
                const minP=Math.min(...prices),maxP=Math.max(...prices);
                const best=entries.find(e=>e.price===minP);
                const pctDiff=maxP>0?((maxP-minP)/maxP*100).toFixed(1):0;
                const unit=entries[0]?.unit||"",cat=entries[0]?.category||"";
                const isMulti=entries.length>1;
                return(
                  <tr key={prod} style={{background:"#080f1a"}}>
                    <TD style={{fontWeight:600}}>{prod}</TD>
                    <TD style={{color:"#4a7a9b",fontSize:11}}>{unit}</TD>
                    <TD style={{color:CAT_COLORS[cat]||"#888",fontSize:11}}>{CAT_ICONS[cat]} {cat}</TD>
                    {data.suppliers.filter(s=>s.active).map(s=>{
                      const e=entries.find(x=>x.supplier===s.name);
                      const isBest=e&&e.price===minP&&isMulti;
                      return(
                        <TD key={s.id} center>
                          {e?<span style={{color:isBest?"#16a34a":"#c8daea",fontWeight:isBest?700:400,background:isBest?"#0d2010":"transparent",padding:isBest?"2px 8px":"0",borderRadius:5,fontSize:12}}>{e.price.toFixed(4)}€</span>:<span style={{color:"#2a4a6a"}}>—</span>}
                        </TD>
                      );
                    })}
                    <TD center style={{color:"#16a34a",fontWeight:700}}>{best?.supplier||"—"}</TD>
                    <TD center>{isMulti&&parseFloat(pctDiff)>0?<span style={{color:"#f59e0b",fontWeight:600,fontSize:11}}>-{pctDiff}%</span>:<span style={{color:"#4a6a8a"}}>—</span>}</TD>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </Card>
    </PageWrap>
  );
}

// ─── Recipes Page ─────────────────────────────────────────────────────────────
function RecipesPage({data,save,notify,setPage,activeProject}){
  const [search,setSearch]=useState("");
  const [printRecipe,setPrintRecipe]=useState(null);
  const [projFilter,setProjFilter]=useState(activeProject||"all");

  useEffect(()=>{if(activeProject)setProjFilter(activeProject);},[activeProject]);

  const filtered=data.recipes.filter(r=>{
    if(projFilter!=="all"&&r.projectId!==parseInt(projFilter))return false;
    if(search&&!r.name.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });

  const cloneRecipe=(r)=>{
    const c={...r,id:Date.now(),name:`${r.name} (Αντίγραφο)`,ingredients:r.ingredients.map(i=>({...i}))};
    save({...data,recipes:[...data.recipes,c]});
    notify("✅ Η συνταγή αντιγράφηκε — μπορείτε να την επεξεργαστείτε");
  };

  const moveRecipe=(recipe,newProjectId)=>{
    save({...data,recipes:data.recipes.map(r=>r.id===recipe.id?{...r,projectId:newProjectId===null?null:parseInt(newProjectId)}:r)});
    notify("✅ Η συνταγή μεταφέρθηκε");
  };

  return(
    <PageWrap>
      {printRecipe&&<PrintRecipeModal recipe={printRecipe} onClose={()=>setPrintRecipe(null)}/>}
      <div style={{display:"flex",gap:12,marginBottom:16,alignItems:"center",flexWrap:"wrap"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Αναζήτηση..."
          style={{padding:"9px 12px",background:"#0a1520",border:"1px solid #1e3a5f",borderRadius:7,color:"#c8daea",fontSize:13,outline:"none",width:260}}/>
        <select value={projFilter} onChange={e=>setProjFilter(e.target.value)}
          style={{padding:"9px 12px",background:"#0a1520",border:"1px solid #1e3a5f",borderRadius:7,color:"#c8daea",fontSize:13,outline:"none"}}>
          <option value="all">📚 Όλα τα Projects</option>
          {(data.projects||[]).map(p=><option key={p.id} value={p.id}>🏢 {p.name}</option>)}
        </select>
        <span style={{color:"#4a6a8a",fontSize:13,marginLeft:"auto"}}>{filtered.length} συνταγές</span>
        <Btn onClick={()=>setPage("recipe-form")} variant="success">+ Νέα Συνταγή</Btn>
      </div>

      {filtered.length===0?(
        <Card style={{textAlign:"center",padding:50}}>
          <div style={{fontSize:40,marginBottom:10}}>📖</div>
          <div style={{color:"#4a6a8a"}}>Δεν υπάρχουν συνταγές για αυτό το φίλτρο</div>
          <Btn style={{marginTop:14}} onClick={()=>setPage("recipe-form")} variant="success">+ Νέα Συνταγή</Btn>
        </Card>
      ):(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>
          {filtered.map(r=>{
            const totalCost=r.ingredients.reduce((s,i)=>s+(i.qty*i.costPerUnit),0);
            const margin=r.salePrice>0?((r.salePrice-totalCost)/r.salePrice*100).toFixed(1):0;
            const proj=data.projects?.find(p=>p.id===r.projectId);
            const pColor=proj?PROJECT_COLORS[(proj.id-1)%PROJECT_COLORS.length]:"#4a6a8a";
            return(
              <Card key={r.id} style={{borderTop:`3px solid #d97706`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div>
                    <div style={{color:"#e2c97e",fontWeight:700,fontSize:14}}>{r.name}</div>
                    <div style={{color:"#4a6a8a",fontSize:11,marginTop:2}}>{r.category} · {r.ingredients.length} υλικά · {r.portions} μερ.</div>
                    {proj&&<div style={{color:pColor,fontSize:10,marginTop:2,fontWeight:600}}>🏢 {proj.name}</div>}
                  </div>
                </div>
                <div style={{display:"flex",gap:8,marginBottom:12}}>
                  {[{l:"ΚΟΣΤΟΣ",v:`${totalCost.toFixed(4)}€`,c:"#ef4444"},{l:"ΠΩΛΗΣΗ",v:`${r.salePrice.toFixed(2)}€`,c:"#16a34a"},{l:"ΠΕΡΙΘΩΡΙΟ",v:`${margin}%`,c:"#e2c97e"}].map(k=>(
                    <div key={k.l} style={{flex:1,background:"#0a1520",borderRadius:6,padding:"7px 10px"}}>
                      <div style={{color:"#4a6a8a",fontSize:9,marginBottom:1}}>{k.l}</div>
                      <div style={{color:k.c,fontWeight:700,fontSize:13}}>{k.v}</div>
                    </div>
                  ))}
                </div>
                {(r.allergens||[]).length>0&&<div style={{display:"flex",gap:3,marginBottom:10,flexWrap:"wrap"}}>{r.allergens.map(a=><span key={a} style={{background:"#1a1500",border:"1px solid #4a3a00",color:"#f59e0b",fontSize:9,padding:"1px 7px",borderRadius:8}}>{a}</span>)}</div>}

                {/* Clone to project */}
                <div style={{marginBottom:8}}>
                  <select onChange={e=>{if(e.target.value)moveRecipe(r,e.target.value===""?null:e.target.value);e.target.value="";}}
                    style={{width:"100%",padding:"6px 10px",background:"#0a1520",border:"1px solid #1e3a5f",borderRadius:6,color:"#4a6a8a",fontSize:11,outline:"none"}}>
                    <option value="">📁 Μεταφορά σε project...</option>
                    {(data.projects||[]).filter(p=>p.id!==r.projectId).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                  </select>
                </div>

                <div style={{display:"flex",gap:6}}>
                  <Btn small variant="ghost" style={{flex:1}} onClick={()=>setPrintRecipe(r)}>📄 Εκτύπωση</Btn>
                  <Btn small variant="ghost" onClick={()=>cloneRecipe(r)}>⧉ Clone</Btn>
                  <Btn small variant="danger" onClick={()=>{save({...data,recipes:data.recipes.filter(x=>x.id!==r.id)});notify("Διαγράφηκε");}}>✕</Btn>
                </div>
              </Card>
            );
          })}
        </div>
      )}
    </PageWrap>
  );
}

// ─── Recipe Form ──────────────────────────────────────────────────────────────
function RecipeFormPage({data,save,notify,activeProject}){
  const [form,setForm]=useState({name:"",category:"ΖΕΣΤΑ",portions:1,salePrice:"",allergens:[],instructions:"",notes:"",projectId:activeProject||null});
  const [ingredients,setIngredients]=useState([{material:"",qty:"",unit:"ΓΡΑΜΜΑΡΙΑ",costPerUnit:""}]);
  const [cloneFrom,setCloneFrom]=useState("");

  const ALLERGENS=["ΓΛΟΥΤΕΝΗ","ΓΑΛΑ","ΑΥΓΑ","ΨΑΡΙ","ΟΣΤΡΑΚΑ","ΣΕΛΙΝΟ","ΜΟΥΣΤΑΡΔΑ","ΣΗΣΑΜΙ","ΘΕΙΙΚΑ","ΑΡΑΧΙΔΕΣ","ΞΗΡΑ ΚΕΛΥΦΗ"];
  const CATS=["ΖΕΣΤΑ","ΚΡΥΑ","ΣΟΥΠΕΣ","ΖΥΜΑΡΙΚΑ","ΨΑΡΙΑ","ΚΡΕΑΤΑ","ΓΛΥΚΑ","ΣΑΛΑΤΕΣ"];
  const UNITS=["ΓΡΑΜΜΑΡΙΑ","ΚΙΛΟ","ΛΙΤΡΟ","ML","ΤΕΜ","ΤΕΜΑΧΙΟ"];

  // Load from existing recipe (clone/edit)
  const loadRecipe=(id)=>{
    if(!id)return;
    const r=data.recipes.find(x=>x.id===parseInt(id));if(!r)return;
    setForm({name:`${r.name}`,category:r.category,portions:r.portions,salePrice:r.salePrice,allergens:[...r.allergens],instructions:r.instructions,notes:r.notes,projectId:activeProject||r.projectId});
    setIngredients(r.ingredients.map(i=>({...i})));
    setCloneFrom("");
  };

  const addIng=()=>setIngredients([...ingredients,{material:"",qty:"",unit:"ΓΡΑΜΜΑΡΙΑ",costPerUnit:""}]);
  const removeIng=i=>setIngredients(ingredients.filter((_,idx)=>idx!==i));
  const updateIng=(i,k,v)=>{const r=[...ingredients];r[i]={...r[i],[k]:v};setIngredients(r);};
  const toggleAllergen=a=>setForm({...form,allergens:form.allergens.includes(a)?form.allergens.filter(x=>x!==a):[...form.allergens,a]});

  // Auto-fill price from project prices
  const autofillPrice=(i,material)=>{
    const latest=getLatestPrices(data.prices,form.projectId);
    const match=latest.find(p=>p.product===material.toUpperCase().trim());
    if(match){const r=[...ingredients];r[i]={...r[i],costPerUnit:match.price};setIngredients(r);}
  };

  const totalCost=ingredients.reduce((s,i)=>{const q=parseFloat(i.qty)||0,c=parseFloat(i.costPerUnit)||0;return s+q*c;},0);
  const salePrice=parseFloat(form.salePrice)||0;
  const margin=salePrice>0?((salePrice-totalCost)/salePrice*100).toFixed(1):0;
  const costPct=salePrice>0?(totalCost/salePrice*100).toFixed(1):0;

  const saveRecipe=()=>{
    if(!form.name.trim()){notify("Συμπληρώστε όνομα","error");return;}
    const recipe={id:Date.now(),...form,portions:parseInt(form.portions)||1,salePrice:parseFloat(form.salePrice)||0,projectId:form.projectId?parseInt(form.projectId):null,
      ingredients:ingredients.filter(i=>i.material.trim()).map(i=>({material:i.material.trim().toUpperCase(),qty:parseFloat(i.qty)||0,unit:i.unit,costPerUnit:parseFloat(i.costPerUnit)||0}))};
    save({...data,recipes:[...data.recipes,recipe]});
    notify("✅ Η συνταγή αποθηκεύτηκε!");
    setForm({name:"",category:"ΖΕΣΤΑ",portions:1,salePrice:"",allergens:[],instructions:"",notes:"",projectId:activeProject||null});
    setIngredients([{material:"",qty:"",unit:"ΓΡΑΜΜΑΡΙΑ",costPerUnit:""}]);
  };

  return(
    <PageWrap>
      {/* Clone from existing */}
      <Card style={{marginBottom:16,border:"1px solid #1e3a5f"}}>
        <div style={{color:"#e2c97e",fontWeight:700,marginBottom:12}}>📋 Φόρτωση από υπάρχουσα συνταγή (προαιρετικό)</div>
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          <select value={cloneFrom} onChange={e=>setCloneFrom(e.target.value)}
            style={{flex:1,padding:"9px 12px",background:"#0a1520",border:"1px solid #1e3a5f",borderRadius:7,color:"#c8daea",fontSize:13,outline:"none"}}>
            <option value="">— Επιλέξτε συνταγή για φόρτωση / κλωνοποίηση —</option>
            {(data.projects||[]).map(p=>(
              <optgroup key={p.id} label={`🏢 ${p.name}`}>
                {data.recipes.filter(r=>r.projectId===p.id).map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
              </optgroup>
            ))}
            {data.recipes.filter(r=>!r.projectId).length>0&&(
              <optgroup label="📚 Χωρίς Project">
                {data.recipes.filter(r=>!r.projectId).map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
              </optgroup>
            )}
          </select>
          <Btn onClick={()=>loadRecipe(cloneFrom)} variant="ghost" style={{whiteSpace:"nowrap"}}>⧉ Φόρτωση Συνταγής</Btn>
        </div>
        <div style={{color:"#4a6a8a",fontSize:11,marginTop:8}}>Μπορείτε να φορτώσετε οποιαδήποτε συνταγή, να την τροποποιήσετε και να την αποθηκεύσετε σε διαφορετικό project.</div>
      </Card>

      <div style={{display:"grid",gridTemplateColumns:"1fr 320px",gap:16}}>
        <div>
          <Card style={{marginBottom:14}}>
            <div style={{color:"#e2c97e",fontWeight:700,marginBottom:16}}>✏ Στοιχεία Συνταγής</div>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:12,marginBottom:12}}>
              <div style={{gridColumn:"1/-1"}}><Label>Όνομα Συνταγής *</Label><Input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="π.χ. CARPACCIO ΛΑΒΡΑΚΙ"/></div>
              <div><Label>Κατηγορία</Label><Select value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>{CATS.map(c=><option key={c}>{c}</option>)}</Select></div>
              <div><Label>Μερίδες</Label><Input type="number" value={form.portions} onChange={e=>setForm({...form,portions:e.target.value})}/></div>
              <div><Label>Τιμή Πώλησης €</Label><Input type="number" value={form.salePrice} onChange={e=>setForm({...form,salePrice:e.target.value})} placeholder="0.00"/></div>
              <div>
                <Label>Project</Label>
                <Select value={form.projectId||""} onChange={e=>setForm({...form,projectId:e.target.value?parseInt(e.target.value):null})}>
                  <option value="">— Χωρίς project —</option>
                  {(data.projects||[]).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                </Select>
              </div>
            </div>
            <div style={{marginBottom:12}}>
              <Label>Αλλεργιογόνα</Label>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {ALLERGENS.map(a=>(
                  <button key={a} onClick={()=>toggleAllergen(a)}
                    style={{padding:"4px 9px",borderRadius:5,border:`1px solid ${form.allergens.includes(a)?"#d97706":"#1e3a5f"}`,background:form.allergens.includes(a)?"#1a0d00":"transparent",color:form.allergens.includes(a)?"#f59e0b":"#4a6a8a",fontSize:11,cursor:"pointer"}}>
                    {a}
                  </button>
                ))}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div><Label>Οδηγίες Παρασκευής</Label><textarea value={form.instructions} onChange={e=>setForm({...form,instructions:e.target.value})} placeholder="Βήμα βήμα..." style={{width:"100%",height:90,padding:"8px 11px",background:"#0a1520",border:"1px solid #1e3a5f",borderRadius:7,color:"#c8daea",fontSize:12,outline:"none",resize:"vertical",boxSizing:"border-box"}}/></div>
              <div><Label>Σχόλια</Label><textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="Επιπλέον πληροφορίες..." style={{width:"100%",height:90,padding:"8px 11px",background:"#0a1520",border:"1px solid #1e3a5f",borderRadius:7,color:"#c8daea",fontSize:12,outline:"none",resize:"vertical",boxSizing:"border-box"}}/></div>
            </div>
          </Card>

          <Card>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{color:"#e2c97e",fontWeight:700}}>🥗 Υλικά Συνταγής</div>
              <Btn small variant="ghost" onClick={addIng}>+ Υλικό</Btn>
            </div>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr><TH>#</TH><TH>Υλικό</TH><TH>Ποσ.</TH><TH>Μον.</TH><TH>Τιμή/Μον.</TH><TH center>Κόστος</TH><TH></TH></tr></thead>
              <tbody>
                {ingredients.map((ing,i)=>{
                  const cost=(parseFloat(ing.qty)||0)*(parseFloat(ing.costPerUnit)||0);
                  const autoMatch=getLatestPrices(data.prices,form.projectId).find(p=>p.product===ing.material.toUpperCase().trim());
                  return(
                    <tr key={i} style={{background:i%2===0?"#080f1a":"transparent"}}>
                      <TD center style={{color:"#4a6a8a"}}>{i+1}</TD>
                      <TD>
                        <input value={ing.material} onChange={e=>updateIng(i,"material",e.target.value)} onBlur={e=>autofillPrice(i,e.target.value)}
                          placeholder="Υλικό..." list="mat-list"
                          style={{width:"100%",background:"transparent",border:"none",borderBottom:"1px solid #1e3a5f",color:"#c8daea",fontSize:12,padding:"3px 0",outline:"none"}}/>
                        <datalist id="mat-list">{[...new Set(data.prices.map(p=>p.product))].map(p=><option key={p} value={p}/>)}</datalist>
                        {autoMatch&&<div style={{color:"#16a34a",fontSize:9,marginTop:1}}>✓ τιμή: {autoMatch.price.toFixed(4)}€ ({autoMatch.supplier})</div>}
                      </TD>
                      <TD><input type="number" value={ing.qty} onChange={e=>updateIng(i,"qty",e.target.value)} style={{width:60,background:"transparent",border:"none",borderBottom:"1px solid #1e3a5f",color:"#e2c97e",fontSize:12,padding:"3px 0",outline:"none",textAlign:"right"}}/></TD>
                      <TD><select value={ing.unit} onChange={e=>updateIng(i,"unit",e.target.value)} style={{background:"#0a1520",border:"1px solid #1e3a5f",borderRadius:5,color:"#c8daea",fontSize:11,padding:"3px 5px"}}>{UNITS.map(u=><option key={u}>{u}</option>)}</select></TD>
                      <TD><input type="number" value={ing.costPerUnit} onChange={e=>updateIng(i,"costPerUnit",e.target.value)} style={{width:75,background:"transparent",border:"none",borderBottom:"1px solid #1e3a5f",color:"#c8daea",fontSize:12,padding:"3px 0",outline:"none",textAlign:"right"}}/></TD>
                      <TD center style={{color:"#e2c97e",fontWeight:600}}>{cost.toFixed(4)}€</TD>
                      <TD center><Btn small variant="danger" onClick={()=>removeIng(i)}>✕</Btn></TD>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            <button onClick={addIng} style={{width:"100%",padding:"8px",marginTop:8,background:"transparent",border:"1px dashed #1e3a5f",borderRadius:7,color:"#4a6a8a",fontSize:12,cursor:"pointer"}}>+ Υλικό</button>
          </Card>
        </div>

        {/* Costing panel */}
        <div>
          <Card style={{position:"sticky",top:0}}>
            <div style={{color:"#e2c97e",fontWeight:700,marginBottom:16}}>💶 Κοστολόγηση Real-time</div>
            <div style={{background:"#0a1520",borderRadius:8,padding:14,marginBottom:14}}>
              {[{l:"Κόστος Υλικών",v:`${totalCost.toFixed(4)}€`,c:"#ef4444"},{l:"Τιμή Πώλησης",v:`${salePrice.toFixed(2)}€`,c:"#16a34a"},{l:"Περιθώριο",v:`${margin}%`,c:"#e2c97e"},{l:"Food Cost",v:`${costPct}%`,c:parseFloat(costPct)>35?"#ef4444":parseFloat(costPct)>28?"#f59e0b":"#16a34a"}].map(k=>(
                <div key={k.l} style={{display:"flex",justifyContent:"space-between",marginBottom:8,paddingBottom:8,borderBottom:"1px solid #0f2030"}}>
                  <span style={{color:"#4a6a8a",fontSize:13}}>{k.l}</span>
                  <span style={{color:k.c,fontWeight:700,fontSize:15}}>{k.v}</span>
                </div>
              ))}
            </div>
            <div style={{marginBottom:16}}>
              <div style={{height:8,background:"#0a1520",borderRadius:4,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${Math.min(parseFloat(costPct),100)}%`,background:parseFloat(costPct)>35?"#ef4444":parseFloat(costPct)>28?"#f59e0b":"#16a34a",borderRadius:4,transition:"width 0.3s"}}/>
              </div>
            </div>
            {form.projectId&&(
              <div style={{background:"#0a1520",borderRadius:7,padding:"8px 12px",marginBottom:12,border:"1px solid #1e3a5f"}}>
                <div style={{color:"#4a6a8a",fontSize:10,marginBottom:3}}>ΑΠΟΘΗΚΕΥΣΗ ΣΕ PROJECT</div>
                <div style={{color:"#e2c97e",fontSize:12,fontWeight:700}}>{data.projects?.find(p=>p.id===form.projectId)?.name||"—"}</div>
              </div>
            )}
            <Btn onClick={saveRecipe} variant="success" style={{width:"100%",padding:12,fontSize:14}}>💾 ΑΠΟΘΗΚΕΥΣΗ ΣΥΝΤΑΓΗΣ</Btn>
          </Card>
        </div>
      </div>
    </PageWrap>
  );
}

// ─── Costing Page ─────────────────────────────────────────────────────────────
function CostingPage({data,activeProject}){
  const [selected,setSelected]=useState(null);
  const [projFilter,setProjFilter]=useState(activeProject||"all");
  const recipe=data.recipes.find(r=>r.id===selected);
  const totalCost=recipe?recipe.ingredients.reduce((s,i)=>s+(i.qty*i.costPerUnit),0):0;
  const margin=recipe?.salePrice>0?((recipe.salePrice-totalCost)/recipe.salePrice*100).toFixed(1):0;
  const filteredRecipes=data.recipes.filter(r=>projFilter==="all"||r.projectId===parseInt(projFilter));

  return(
    <PageWrap>
      <div style={{display:"grid",gridTemplateColumns:"240px 1fr",gap:16}}>
        <Card>
          <div style={{marginBottom:12}}>
            <select value={projFilter} onChange={e=>{setProjFilter(e.target.value);setSelected(null);}}
              style={{width:"100%",padding:"8px 10px",background:"#0a1520",border:"1px solid #1e3a5f",borderRadius:7,color:"#c8daea",fontSize:12,outline:"none"}}>
              <option value="all">📚 Όλα</option>
              {(data.projects||[]).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
            </select>
          </div>
          <div style={{color:"#e2c97e",fontWeight:700,marginBottom:10,fontSize:12}}>ΕΠΙΛΟΓΗ ΣΥΝΤΑΓΗΣ</div>
          {filteredRecipes.map(r=>(
            <div key={r.id} onClick={()=>setSelected(r.id)}
              style={{padding:"9px 10px",marginBottom:4,borderRadius:7,cursor:"pointer",background:selected===r.id?"#1e3a5f":"#0a1520",border:`1px solid ${selected===r.id?"#3a6a9a":"#1e3a5f"}`}}>
              <div style={{color:selected===r.id?"#e2c97e":"#c8daea",fontSize:12,fontWeight:selected===r.id?700:400}}>{r.name}</div>
              <div style={{color:"#4a6a8a",fontSize:10}}>{r.category}</div>
            </div>
          ))}
        </Card>
        {recipe?(
          <Card>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
              <div><div style={{color:"#e2c97e",fontWeight:700,fontSize:16}}>{recipe.name}</div><div style={{color:"#4a6a8a",fontSize:12}}>{recipe.category} · {recipe.portions} μερίδες</div></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
              {[{l:"Κόστος",v:`${totalCost.toFixed(4)}€`,c:"#ef4444"},{l:"Κόστος/Μερ.",v:`${(totalCost/recipe.portions).toFixed(4)}€`,c:"#f59e0b"},{l:"Πώληση",v:`${recipe.salePrice.toFixed(2)}€`,c:"#16a34a"},{l:"Περιθώριο",v:`${margin}%`,c:"#e2c97e"}].map(k=>(
                <div key={k.l} style={{background:"#0a1520",borderRadius:7,padding:"12px 14px"}}><div style={{color:"#4a6a8a",fontSize:10,marginBottom:4}}>{k.l}</div><div style={{color:k.c,fontWeight:700,fontSize:18}}>{k.v}</div></div>
              ))}
            </div>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr><TH>#</TH><TH>Υλικό</TH><TH>Ποσ.</TH><TH>Μον.</TH><TH center>Τιμή/Μον.</TH><TH center>Κόστος</TH><TH center>% Συνταγής</TH></tr></thead>
              <tbody>{recipe.ingredients.map((ing,i)=>{
                const cost=ing.qty*ing.costPerUnit;const pct=totalCost>0?(cost/totalCost*100).toFixed(1):0;
                return(<tr key={i} style={{background:i%2===0?"#080f1a":"transparent"}}>
                  <TD center style={{color:"#4a6a8a"}}>{i+1}</TD><TD style={{fontWeight:600}}>{ing.material}</TD>
                  <TD center>{ing.qty}</TD><TD center style={{color:"#4a6a8a"}}>{ing.unit}</TD>
                  <TD center>{ing.costPerUnit.toFixed(4)}€</TD>
                  <TD center style={{color:"#e2c97e",fontWeight:600}}>{cost.toFixed(4)}€</TD>
                  <TD center><div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{flex:1,height:6,background:"#0a1520",borderRadius:3}}><div style={{height:"100%",width:`${pct}%`,background:"#e2c97e",borderRadius:3}}/></div>
                    <span style={{color:"#4a6a8a",fontSize:11,width:32}}>{pct}%</span>
                  </div></TD>
                </tr>);
              })}</tbody>
            </table>
          </Card>
        ):(
          <Card style={{display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{textAlign:"center",color:"#4a6a8a"}}><div style={{fontSize:40,marginBottom:10}}>📖</div><div>Επιλέξτε συνταγή</div></div></Card>
        )}
      </div>
    </PageWrap>
  );
}

// ─── Order Page ───────────────────────────────────────────────────────────────
function OrderPage({data,save,notify,activeProject}){
  const [supplier,setSupplier]=useState(data.suppliers[0]?.name||"");
  const [date,setDate]=useState(new Date().toISOString().split("T")[0]);
  const [notes,setNotes]=useState("");
  const [lines,setLines]=useState([{product:"",qty:"",unit:"ΚΙΛΟ",price:""}]);
  const updateLine=(i,k,v)=>{const r=[...lines];r[i]={...r[i],[k]:v};setLines(r);};
  const UNITS=["ΚΙΛΟ","ΛΙΤΡΟ","ΤΕΜ","ΤΜΧ","ΓΡΑΜΜΑΡΙΑ","ΤΕΜΑΧΙΟ","ΚΙΒΩΤΙΟ"];
  const total=lines.reduce((s,l)=>{const q=parseFloat(l.qty)||0,p=parseFloat(l.price)||0;return s+q*p;},0);
  const saveOrder=()=>{
    const valid=lines.filter(l=>l.product.trim());if(!valid.length){notify("Προσθέστε προϊόντα","error");return;}
    const o={id:Date.now(),date,supplier,notes,total,projectId:activeProject||null,lines:valid.map(l=>({...l,qty:parseFloat(l.qty)||0,price:parseFloat(l.price)||0,total:(parseFloat(l.qty)||0)*(parseFloat(l.price)||0)}))};
    save({...data,orders:[...data.orders,o]});notify("✅ Παραγγελία αποθηκεύτηκε!");setLines([{product:"",qty:"",unit:"ΚΙΛΟ",price:""}]);setNotes("");
  };

    <PageWrap>

        <Card>
          <div style={{color:"#e2c97e",fontWeight:700,marginBottom:16}}>Στοιχεία Παραγγελίας</div>
          <div style={{marginBottom:10}}><Label>Ημερομηνία</Label><Input type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
          <div style={{marginBottom:10}}><Label>Προμηθευτής</Label><Select value={supplier} onChange={e=>setSupplier(e.target.value)}>{data.suppliers.filter(s=>s.active).map(s=><option key={s.id}>{s.name}</option>)}</Select></div>
          <div style={{marginBottom:14}}><Label>Σημειώσεις</Label><textarea value={notes} onChange={e=>setNotes(e.target.value)} style={{width:"100%",height:70,padding:"8px 10px",background:"#0a1520",border:"1px solid #1e3a5f",borderRadius:7,color:"#c8daea",fontSize:12,outline:"none",resize:"none",boxSizing:"border-box"}}/></div>
          <div style={{background:"#0a1520",borderRadius:8,padding:14,marginBottom:14}}>
            <div style={{color:"#4a6a8a",fontSize:10,marginBottom:3}}>ΣΥΝΟΛΟ</div>
            <div style={{color:"#e2c97e",fontWeight:700,fontSize:22}}>{total.toFixed(2)}€</div>
            <div style={{color:"#4a6a8a",fontSize:11}}>+ΦΠΑ 13%: {(total*0.13).toFixed(2)}€</div>
            <div style={{color:"#16a34a",fontWeight:600}}>{(total*1.13).toFixed(2)}€</div>
          </div>
          <Btn onClick={saveOrder} variant="success" style={{width:"100%",marginBottom:8}}>💾 ΑΠΟΘΗΚΕΥΣΗ</Btn>
        </Card>
        <Card>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}><div style={{color:"#e2c97e",fontWeight:700}}>Γραμμές Παραγγελίας</div><Btn small variant="ghost" onClick={()=>setLines([...lines,{product:"",qty:"",unit:"ΚΙΛΟ",price:""}])}>+ Γραμμή</Btn></div>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr><TH>#</TH><TH>Προϊόν</TH><TH>Ποσ.</TH><TH>Μον.</TH><TH center>Τιμή</TH><TH center>Σύνολο</TH><TH></TH></tr></thead>
            <tbody>{lines.map((l,i)=>{const lt=(parseFloat(l.qty)||0)*(parseFloat(l.price)||0);return(
              <tr key={i} style={{background:i%2===0?"#080f1a":"transparent"}}>
                <TD center style={{color:"#4a6a8a"}}>{i+1}</TD>
                <TD><input value={l.product} onChange={e=>updateLine(i,"product",e.target.value)} list="prod-list" placeholder="Προϊόν..." style={{width:"100%",background:"transparent",border:"none",borderBottom:"1px solid #1e3a5f",color:"#c8daea",fontSize:12,padding:"3px 0",outline:"none"}}/>
                  <datalist id="prod-list">{[...new Set(data.prices.filter(p=>p.supplier===supplier).map(p=>p.product))].map(p=><option key={p} value={p}/>)}</datalist></TD>
                <TD><input type="number" value={l.qty} onChange={e=>updateLine(i,"qty",e.target.value)} style={{width:55,background:"transparent",border:"none",borderBottom:"1px solid #1e3a5f",color:"#e2c97e",fontSize:12,padding:"3px 0",outline:"none",textAlign:"right"}}/></TD>
                <TD><select value={l.unit} onChange={e=>updateLine(i,"unit",e.target.value)} style={{background:"#0a1520",border:"1px solid #1e3a5f",borderRadius:5,color:"#c8daea",fontSize:11,padding:"3px 5px"}}>{UNITS.map(u=><option key={u}>{u}</option>)}</select></TD>
                <TD><input type="number" value={l.price} onChange={e=>updateLine(i,"price",e.target.value)} style={{width:65,background:"transparent",border:"none",borderBottom:"1px solid #1e3a5f",color:"#c8daea",fontSize:12,padding:"3px 0",outline:"none",textAlign:"right"}}/></TD>
                <TD center style={{color:"#e2c97e",fontWeight:600}}>{lt.toFixed(2)}€</TD>
                <TD center><Btn small variant="danger" onClick={()=>setLines(lines.filter((_,idx)=>idx!==i))}>✕</Btn></TD>
              </tr>);})}</tbody>
          </table>
          <button onClick={()=>setLines([...lines,{product:"",qty:"",unit:"ΚΙΛΟ",price:""}])} style={{width:"100%",padding:"8px",marginTop:8,background:"transparent",border:"1px dashed #1e3a5f",borderRadius:7,color:"#4a6a8a",fontSize:12,cursor:"pointer"}}>+ Γραμμή</button>
        </Card>
      </div>
    </PageWrap>
  );
}

// ─── Import Box (paste JSON) ──────────────────────────────────────────────────
function ImportBox({data, save, notify}) {
  const [open, setOpen] = useState(false);
  const [text, setText] = useState("");
  const [status, setStatus] = useState(null);

  const doImport = () => {
    try {
      const parsed = JSON.parse(text);
      let newRecipes = [];
      if(parsed.version === "kitchenos-import-v1") {
        newRecipes = parsed.recipes || [];
      } else if(Array.isArray(parsed)) {
        newRecipes = parsed;
      } else if(parsed.recipes) {
        newRecipes = parsed.recipes;
      } else if(parsed.users && parsed.suppliers) {
        save(parsed);
        notify("✅ Πλήρης επαναφορά: " + (parsed.recipes?.length||0) + " συνταγές");
        setOpen(false); setText(""); return;
      }
      const existingNames = new Set(data.recipes.map(r=>r.name.trim()));
      const toAdd = newRecipes.filter(r=>!existingNames.has((r.name||"").trim()));
      save({...data, recipes:[...data.recipes, ...toAdd]});
      const msg = "✅ Εισήχθησαν " + toAdd.length + " συνταγές (" + (newRecipes.length-toAdd.length) + " διπλότυπα παραλείφθηκαν)";
      setStatus({ok:true, msg});
      notify(msg);
      setTimeout(()=>{setOpen(false);setText("");setStatus(null);}, 2000);
    } catch(e) {
      setStatus({ok:false, msg:"❌ Μη έγκυρο JSON — ελέγξτε το αρχείο"});
    }
  };

  return (
    <div style={{background:"linear-gradient(135deg,#0d2010,#0d1829)",border:"1px solid #16a34a40",borderRadius:8,padding:14,marginBottom:10}}>
      <div style={{color:"#16a34a",fontWeight:700,fontSize:13,marginBottom:6}}>📥 ΕΙΣΑΓΩΓΗ ΣΥΝΤΑΓΩΝ</div>
      {!open ? (
        <>
          <div style={{color:"#4a6a8a",fontSize:11,marginBottom:10}}>
            Ανοίξτε το <b style={{color:"#c8daea"}}>kitchenos_import.json</b> με Notepad, επιλέξτε τα πάντα <b style={{color:"#c8daea"}}>(Ctrl+A)</b>, αντιγράψτε <b style={{color:"#c8daea"}}>(Ctrl+C)</b> και επικολλήστε εδώ.
          </div>
          <Btn onClick={()=>setOpen(true)} variant="success" style={{width:"100%"}}>
            📋 ΕΠΙΚΟΛΛΗΣΗ JSON — ΕΙΣΑΓΩΓΗ ΣΥΝΤΑΓΩΝ
          </Btn>
        </>
      ) : (
        <>
          <div style={{color:"#4a6a8a",fontSize:11,marginBottom:8}}>
            Επικολλήστε το περιεχόμενο του kitchenos_import.json <b style={{color:"#c8daea"}}>(Ctrl+V)</b>:
          </div>
          <textarea
            value={text}
            onChange={e=>setText(e.target.value)}
            placeholder='Επικολλήστε εδώ το JSON... {"version":"kitchenos-import-v1","recipes":[...]}'
            style={{width:"100%",height:120,padding:"9px 12px",background:"#0a1520",border:"1px solid #1e3a5f",borderRadius:7,color:"#c8daea",fontSize:11,outline:"none",resize:"vertical",boxSizing:"border-box",fontFamily:"monospace",marginBottom:8}}
            autoFocus
          />
          {status && (
            <div style={{padding:"8px 12px",borderRadius:6,marginBottom:8,background:status.ok?"#0d2010":"#200808",color:status.ok?"#16a34a":"#ef4444",fontSize:12,fontWeight:600}}>
              {status.msg}
            </div>
          )}
          <div style={{display:"flex",gap:8}}>
            <Btn onClick={doImport} variant="success" style={{flex:1}} >
              ✅ ΕΙΣΑΓΩΓΗ {text.length > 10 ? "(" + (text.match(/"name"/g)||[]).length + " συνταγές)" : ""}
            </Btn>
            <Btn onClick={()=>{setOpen(false);setText("");setStatus(null);}} variant="ghost">Ακύρωση</Btn>
          </div>
        </>
      )}
    </div>
  );
}

                <span style={{color:"#7a9ab5",fontSize:13}}>{k.l}</span>
                <span style={{color:"#e2c97e",fontWeight:700}}>{k.v}</span>
              </div>
            ))}
          </div>

          {/* Import section */}
          <ImportBox data={data} save={save} notify={notify}/>

          <Btn onClick={exportData} variant="ghost" style={{width:"100%",marginBottom:8}}>⬇ EXPORT BACKUP</Btn>
          <div style={{color:"#4a6a8a",fontSize:11,textAlign:"center"}}>Αυτόματη αποθήκευση σε κάθε αλλαγή.</div>
        </Card>
      </div>
    </PageWrap>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<KitchenOS />);
  </script>
</body>
</html>
